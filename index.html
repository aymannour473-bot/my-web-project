<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Orsted ERP Full System</title>
<style>
body{ margin:0; font-family:Segoe UI; background:#0b1220; color:#fff; padding:15px; }
#login{ max-width:360px; margin:70px auto; background:#1f2937; padding:20px; border-radius:12px; text-align:center; }
.logo{ width:120px; height:120px; object-fit:cover; border-radius:50%; animation:pulse 2s infinite; }
@keyframes pulse{ 0%{transform:scale(1)} 50%{transform:scale(1.1)} 100%{transform:scale(1)} }
.nav{ display:grid; grid-template-columns:repeat(5,1fr); gap:5px; margin-bottom:15px; }
.nav button{ padding:8px; border:none; border-radius:8px; background:#1f2937; color:#fff; cursor:pointer; font-size: 12px; }
.nav button.active{ background:#38bdf8; color:#000; }
.section{ display:none; background:#1f2937; padding:15px; border-radius:12px; }
.section.active{ display:block }
input,select,button{ width:100%; padding:10px; margin:6px 0; border-radius:8px; border:none; box-sizing:border-box; }
button{ background:#38bdf8; font-weight:bold; cursor:pointer; }
table{ width:100%; border-collapse:collapse; margin-top:10px; background:#111827; }
th,td{ border:1px solid #333; padding:8px; text-align:center; }
th{ background:#374151 }
.del{ background:red; color:#fff; width:auto; padding:5px 10px; }
#products img { width:50px; height:50px; border-radius:5px; border:1px solid #fff; }
</style>
</head>
<body>

<div id="login">
<img class="logo" src="https://raw.githubusercontent.com/aymannour473-bot/Orsted-ERP-/main/logo.jpeg">
<h3>Orsted ERP</h3>
<input id="user" placeholder="User">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">دخول</button>
</div>

<div id="app" style="display:none">
<div class="nav">
<button onclick="show('clients',this)" class="active">العملاء</button>
<button onclick="show('suppliers',this)">الموردين</button>
<button onclick="show('offers',this)">عروض السعر</button>
<button onclick="show('files',this)">الملفات</button>
<button onclick="show('products',this)">المنتجات</button>
</div>

<div id="clients" class="section active">
<h3>👥 العملاء</h3>
<input id="cname" placeholder="الاسم"><input id="ccomp" placeholder="الشركة">
<input id="cphone" placeholder="التليفون"><button onclick="addClient()">➕ إضافة عميل</button>
<table><thead><tr><th>كود</th><th>اسم</th><th>شركة</th><th>تليفون</th><th>حذف</th></tr></thead><tbody id="ctable"></tbody></table>
</div>

<div id="suppliers" class="section">
<h3>🏭 الموردين</h3>
<input id="sname" placeholder="الاسم"><input id="sphone" placeholder="التليفون">
<button onclick="addSupplier()">➕ إضافة مورد</button>
<table><tbody id="stable"></tbody></table>
</div>

<div id="offers" class="section">
<h3>💰 عروض السعر</h3>
<select id="product"><option>UPVC</option><option>شاتر</option></select>
<button onclick="openOffer()">فتح عرض السعر</button>
</div>

<div id="files" class="section">
<h3>📁 الملفات</h3>
<button onclick="window.open('https://drive.google.com/drive/folders/1uRlnKoTLFl4I-_65XBZqaU32yvZkonvJ','_blank')">ملفات المشروع</button>
</div>

<div id="products" class="section">
<h3>📦 المنتجات</h3>
<table>
<thead><tr><th>صورة</th><th>اسم المنتج</th><th>السعر</th></tr></thead>
<tbody id="product-table">
<tr>
<td><img src="https://raw.githubusercontent.com/aymannour473-bot/Orsted-ERP-/main/WhatsApp%20Image%202026-07-01%20at%203.12.45%20AM.jpeg"></td>
<td>منتج تجريبي</td>
<td>000</td>
</tr>
</tbody>
</table>
</div>
</div>

<script>
function login(){ if(user.value==="admin" && pass.value==="123"){ document.getElementById("login").style.display="none"; document.getElementById("app").style.display="block"; } }
function show(id,btn){ document.querySelectorAll('.section').forEach(s=>s.classList.remove('active')); document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active')); document.getElementById(id).classList.add('active'); btn.classList.add('active'); }
let clients=[];
function addClient(){ clients.push({code:"OEGY"+(100+clients.length), name:cname.value, comp:ccomp.value, phone:cphone.value}); renderClients(); }
function renderClients(){ ctable.innerHTML=clients.map((c,i)=>`<tr><td>${c.code}</td><td>${c.name}</td><td>${c.comp}</td><td>${c.phone}</td><td><button class="del" onclick="clients.splice(${i},1);renderClients()">X</button></td></tr>`).join(''); }
function addSupplier(){ stable.innerHTML+=`<tr><td>${sname.value}</td><td>${sphone.value}</td></tr>`; }
function openOffer(){ alert("فتح عرض سعر: "+product.value); }
</script>
</body>
</html>
