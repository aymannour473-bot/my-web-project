<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Orsted ERP Full System</title>
    <style>
        body{ margin:0; font-family:Segoe UI; background:#0b1220; color:#fff; padding:15px; }
        #login{ max-width:360px; margin:70px auto; background:#1f2937; padding:20px; border-radius:12px; text-align:center; }
        .nav{ display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:15px; }
        .nav button{ padding:10px; border:none; border-radius:8px; background:#1f2937; color:#fff; cursor:pointer; }
        .nav button.active{ background:#38bdf8; color:#000; }
        .section{ display:none; background:#1f2937; padding:15px; border-radius:12px; }
        .section.active{ display:block; }
        input,select,button{ width:100%; padding:10px; margin:6px 0; border-radius:8px; border:none; box-sizing:border-box; }
        button{ background:#38bdf8; font-weight:bold; cursor:pointer; }
        table{ width:100%; border-collapse:collapse; margin-top:10px; background:#111827; }
        th,td{ border:1px solid #333; padding:8px; text-align:center; }
        th{ background:#374151; }
        .del{ background:red; color:#fff; padding:5px 10px; cursor:pointer; }
    </style>
</head>
<body>

<div id="login">
    <h3>Orsted ERP</h3>
    <input id="user" placeholder="User">
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">دخول</button>
</div>

<div id="app" style="display:none">
    <div class="nav">
        <button onclick="show('clients',this)" class="active">العملاء</button>
        <button onclick="show('suppliers',this)">الموردين</button>
        <button onclick="show('offers',this)">عروض السعر</button>
        <button onclick="show('files',this)">الملفات</button>
    </div>

    <div id="clients" class="section active">
        <h3>👥 العملاء</h3>
        <input id="cname" placeholder="الاسم"><input id="ccomp" placeholder="الشركة">
        <button onclick="addClient()">➕ إضافة عميل</button>
        <table><thead><tr><th>كود</th><th>اسم</th><th>شركة</th><th>حذف</th></tr></thead><tbody id="ctable"></tbody></table>
    </div>

    <div id="offers" class="section">
        <h3>💰 إنشاء عرض سعر احترافي</h3>
        <select id="prodSelect">
            <option value="2500">UPVC - 2500 EGP</option>
            <option value="3000">شاتر - 3000 EGP</option>
        </select>
        <div style="display:flex; gap:10px;">
            <input id="width" type="number" placeholder="العرض (سم)">
            <input id="height" type="number" placeholder="الارتفاع (سم)">
            <input id="qty" type="number" placeholder="الكمية">
        </div>
        <button onclick="addOfferRow()">➕ إضافة للجدول</button>
        
        <table id="offerTable">
            <thead>
                <tr><th>المنتج</th><th>المساحة (م²)</th><th>السعر</th><th>الإجمالي</th><th>حذف</th></tr>
            </thead>
            <tbody id="offerBody"></tbody>
        </table>
    </div>

    <div id="suppliers" class="section"><h3>🏭 الموردين</h3><table id="stable"></table></div>
    <div id="files" class="section"><h3>📁 الملفات</h3></div>
</div>

<script>
    function login(){
        if(user.value==="admin" && pass.value==="123"){
            document.getElementById("login").style.display="none";
            document.getElementById("app").style.display="block";
        }
    }

    function show(id,btn){
        document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
        document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }

    function addOfferRow(){
        let w = document.getElementById('width').value / 100;
        let h = document.getElementById('height').value / 100;
        let q = document.getElementById('qty').value;
        let p = document.getElementById('prodSelect').value;
        let name = document.getElementById('prodSelect').options[document.getElementById('prodSelect').selectedIndex].text;
        
        let area = (w * h * q).toFixed(2);
        let total = (area * p).toFixed(2);
        
        document.getElementById('offerBody').innerHTML += `<tr>
            <td>${name}</td><td>${area}</td><td>${p}</td><td>${total}</td>
            <td><button class="del" onclick="this.parentElement.parentElement.remove()">X</button></td>
        </tr>`;
    }

    function addClient(){
        document.getElementById('ctable').innerHTML += `<tr><td>جديد</td><td>${cname.value}</td><td>${ccomp.value}</td><td><button class="del" onclick="this.parentElement.parentElement.remove()">X</button></td></tr>`;
    }
</script>
</body>
</html>
