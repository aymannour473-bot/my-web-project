<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: 'Arial', sans-serif; background: #f4f4f4; padding: 20px; }
        #pdf-content { width: 210mm; background: white; margin: auto; padding: 15px; border: 1px solid #ddd; }
        .header { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; border-bottom: 2px solid #003366; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #003366; color: white; padding: 8px; font-size: 10px; border: 1px solid #fff; }
        td { border: 1px solid #ccc; padding: 5px; text-align: center; font-size: 10px; }
        .p-img { width: 50px; height: 50px; cursor: pointer; border: 1px solid #ddd; }
        input { width: 90%; border: none; text-align: center; }
        .controls { text-align: center; margin-top: 20px; }
    </style>
</head>
<body>

<div id="pdf-content">
    <h2 style="text-align: center; color: #003366;">Orsted Egypt - Quotation</h2>
    <div class="header">
        <div>
            <p>اسم العميل: <input type="text"></p>
            <p>اسم المشروع: <input type="text"></p>
        </div>
        <div>
            <p>التاريخ: <input type="date"></p>
            <p>كود العميل: <input type="text"></p>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>صورة</th><th>المنتج</th><th>اللون</th><th>العرض(mm)</th><th>الارتفاع(mm)</th><th>الكمية</th><th>السعر</th><th>الإجمالي</th><th>حذف</th>
            </tr>
        </thead>
        <tbody id="q-tbody"></tbody>
    </table>
    <h3 id="grand-total">الإجمالي الكلي: 0</h3>
</div>

<div class="controls">
    <button onclick="addRow()">➕ إضافة صف جديد</button>
    <button onclick="downloadPDF()" style="background:green; color:white; padding:10px;">📄 تحميل PDF كامل</button>
</div>

<script>
function addRow() {
    let tbody = document.getElementById('q-tbody');
    let row = document.createElement('tr');
    row.innerHTML = `
        <td><input type="file" accept="image/*" onchange="preview(this)"></td>
        <td><input type="text"></td>
        <td><input type="text"></td>
        <td><input type="number" class="w" oninput="calc(this)"></td>
        <td><input type="number" class="h" oninput="calc(this)"></td>
        <td><input type="number" class="qty" value="1" oninput="calc(this)"></td>
        <td><input type="number" class="price" oninput="calc(this)"></td>
        <td class="total">0</td>
        <td><button onclick="this.parentElement.parentElement.remove(); calcTotal()">🗑️</button></td>
    `;
    tbody.appendChild(row);
}

function preview(input) {
    let reader = new FileReader();
    reader.onload = e => input.parentElement.innerHTML = `<img src="${e.target.result}" class="p-img">`;
    reader.readAsDataURL(input.files[0]);
}

function calc(el) {
    let row = el.parentElement.parentElement;
    let qty = row.querySelector('.qty').value;
    let price = row.querySelector('.price').value;
    row.querySelector('.total').innerText = qty * price;
    calcTotal();
}

function calcTotal() {
    let total = 0;
    document.querySelectorAll('.total').forEach(t => total += parseFloat(t.innerText) || 0);
    document.getElementById('grand-total').innerText = "الإجمالي الكلي: " + total;
}

function downloadPDF() {
    html2pdf().from(document.getElementById('pdf-content')).set({
        margin: 5, filename: 'Orsted_Quotation.pdf',
        jsPDF: { format: 'a4', orientation: 'portrait' }
    }).save();
}
</script>
</body>
</html>
